version: "3.8"

services:
  # ===================== MySQL 数据库 =====================
  mysql:
    image: mysql:8.0
    container_name: shorturl-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DB:-shorturl}
      MYSQL_USER: ${MYSQL_USER:-shorturl}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ===================== Spring Boot 应用 =====================
  app:
    build: .
    container_name: shorturl-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: shorturl
      MYSQL_USER: shorturl
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD}
      TZ: Asia/Shanghai
    ports:
      - "8080:8080"

  # ===================== Nginx 反向代理 =====================
  nginx:
    image: nginx:alpine
    container_name: shorturl-nginx
    restart: unless-stopped
    depends_on:
      - app
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
      # - "443:443"   # 配置 HTTPS 后取消注释
    # volumes:
    #   - ./ssl:/etc/nginx/ssl:ro   # SSL 证书目录

volumes:
  mysql_data: