server.port=8080
# 默认绑定所有接口，生产环境通过 application-prod.yml 覆盖为 127.0.0.1（经 nginx 反向代理）
server.address=0.0.0.0

# 是否信任反向代理头部（X-Forwarded-Host/Proto/Port）。
# 开发环境默认为 false，生产环境在 application-prod.yml 中开启。
shorturl.trusted-proxy=false

# Session Cookie 安全配置
# 开发环境使用 Lax（允许同站导航携带 Cookie）
server.servlet.session.cookie.same-site=lax
# 开发环境不使用 HTTPS，故 Secure 为 false
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.http-only=true

# H2 Database（文件持久化，重启不丢失）
spring.datasource.url=jdbc:h2:file:./data/shorturl;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=${H2_PASSWORD:h2secret}
# H2 控制台仅在开发环境手动开启，默认关闭以保安全
spring.h2.console.enabled=false

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# 管理员初始化已由 AdminService.initDefaultAdmin() 完成，不再使用 SQL 脚本
spring.sql.init.mode=never

# Session 超时时间（2小时）
server.servlet.session.timeout=2h

# Enable static resources
spring.web.resources.static-locations=classpath:/static/
